 <link rel="manifest" href="./manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

<style>
 .auth-card{
  background: var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px;
  margin-bottom:20px;
}

.auth-title{
  color:var(--orange);
  font-size:20px;
  font-weight:800;
  margin-bottom:15px;
}

.auth-input{
  width:100%;
  background:#0f0f0f;
  border:1px solid var(--border);
  color:var(--text);
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  font-size:14px;
}

.auth-input:focus{
  outline:none;
  border-color:var(--orange);
}

.auth-buttons{
  display:flex;
  gap:8px;
}

.auth-btn{
  flex:1;
  border:none;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  cursor:pointer;
}

.auth-btn-primary{
  background:var(--orange);
  color:black;
}

.auth-btn-secondary{
  background:#262626;
  color:white;
}

.auth-btn-danger{
  background:#7f1d1d;
  color:white;
}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --card: #171717;
    --border: #262626;
    --orange: #f97316;
    --orange-dim: rgba(249,115,22,0.12);
    --orange-border: rgba(249,115,22,0.35);
    --text: #f5f5f5;
    --muted: #a3a3a3;
    --subtle: #525252;
    --sky: #38bdf8;
    --sky-dim: rgba(56,189,248,0.08);
    --sky-border: rgba(56,189,248,0.28);
    --indigo: #818cf8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 480px; margin: 0 auto; padding: 24px 16px 64px; }

  /* ── Header ── */
  .header { margin-bottom: 24px; }
  .header-eyebrow { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .eyebrow-text { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--orange); }
  .header h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; text-transform: uppercase; }

  /* ── Stats ── */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 10px; }
  .stat-value { font-size: 22px; font-weight: 900; line-height: 1; color: var(--text); }
  .stat-value.orange { color: var(--orange); }
  .stat-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--subtle); margin-top: 4px; }

  /* ── Day chips ── */
  .day-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  .day-row::-webkit-scrollbar { display: none; }
  .day-chip {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 44px; height: 58px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted);
    cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .day-chip.active { background: var(--orange); border-color: var(--orange); color: #000; }
  .day-chip-day { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .day-chip-num { font-size: 13px; font-weight: 800; margin-top: 2px; }
  .day-chip-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 3px; }
  .day-chip-dot.filled { background: var(--orange); }
  .day-chip.active .day-chip-dot.filled { background: #000; }

  /* ── Day card ── */
  .day-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-bottom: 20px; }
  .day-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .day-title { font-size: 17px; font-weight: 800; }
  .day-subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .day-pct { font-size: 22px; font-weight: 900; color: var(--orange); }
  .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
  .progress-fill { height: 100%; background: var(--orange); border-radius: 99px; transition: width 0.3s ease; }

  /* ── Exercises ── */
  .exercises { display: flex; flex-direction: column; gap: 6px; }
  .ex-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--bg); cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    -webkit-tap-highlight-color: transparent; text-align: left; width: 100%;
  }
  .ex-row.done { background: var(--orange-dim); border-color: var(--orange-border); }
  .ex-checkbox {
    flex-shrink: 0; width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid var(--subtle); display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .ex-row.done .ex-checkbox { background: var(--orange); border-color: var(--orange); }
  .checkmark { display: none; color: #000; font-size: 11px; font-weight: 900; line-height: 1; }
  .ex-row.done .checkmark { display: block; }
  .ex-label { font-size: 13px; color: var(--text); transition: color 0.12s; }
  .ex-row.done .ex-label { color: var(--muted); text-decoration: line-through; }

  /* ── Stretching ── */
  .stretch-section { margin-top: 10px; }
  .stretch-toggle {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 10px 12px;
    background: var(--sky-dim); border: 1px solid var(--sky-border);
    border-radius: 12px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: background 0.15s;
  }
  .stretch-toggle:active { background: rgba(56,189,248,0.14); }
  .stretch-toggle-left { display: flex; align-items: center; gap: 7px; }
  .stretch-toggle-label { font-size: 12px; font-weight: 700; color: var(--sky); }
  .stretch-count { font-size: 10px; color: var(--sky); opacity: 0.7; margin-left: 4px; }
  .stretch-chevron { font-size: 10px; color: var(--sky); transition: transform 0.25s; }
  .stretch-chevron.open { transform: rotate(180deg); }
  .stretch-list { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
  .stretch-list.hidden { display: none; }
  .stretch-row {
    display: flex; align-items: center; gap: 9px; padding: 9px 12px;
    border-radius: 10px; border: 1px solid var(--border); background: var(--bg);
    cursor: pointer; width: 100%;
    -webkit-tap-highlight-color: transparent; transition: background 0.12s, border-color 0.12s;
  }
  .stretch-row.done { background: var(--sky-dim); border-color: var(--sky-border); }
  .stretch-checkbox {
    flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--subtle); display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .stretch-row.done .stretch-checkbox { background: var(--sky); border-color: var(--sky); }
  .stretch-check { display: none; color: #000; font-size: 9px; font-weight: 900; }
  .stretch-row.done .stretch-check { display: block; }
  .stretch-label { font-size: 12px; color: var(--muted); }
  .stretch-row.done .stretch-label { color: var(--subtle); text-decoration: line-through; }

  /* ── Charts row ── */
  .charts-row { display: grid; grid-template-columns: 1fr 140px; gap: 8px; margin-bottom: 20px; align-items: start; }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 14px; }
  .chart-card--pie { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .chart-title {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px;
  }
  .chart-title .icon { color: var(--orange); font-size: 13px; }
  canvas#chart { width: 100% !important; display: block; }
  canvas#pie { display: block; }
  .pie-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; text-align: center;
  }
  .pie-title .icon { color: var(--orange); }
  .pie-legend { display: flex; flex-direction: column; gap: 5px; width: 100%; }
  .pie-legend-item { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .pie-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── Reminders ── */
  .reminders { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .reminder-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 10px; display: flex; align-items: center; gap: 8px; }
  .reminder-icon { font-size: 16px; flex-shrink: 0; }
  .reminder-text { font-size: 11px; color: var(--muted); line-height: 1.35; }

  /* ── Save status ── */
  .save-status { text-align: center; font-size: 10px; color: var(--subtle); margin-top: 20px; letter-spacing: 0.05em; min-height: 16px; }

</style>
</head>
<body>

<div class="app">

<script>

// ── Workout plan ─────────────────────────────────────────────────
const PLAN = {
  Sunday:    { tag: "Rest & Recovery",   focus: "",                exercises: ["Complete rest", "Hydrate — 3L water minimum", "Light walk (optional)"] },
  Monday:    { tag: "Push + Shoulders",  focus: "Aesthetic Focus", exercises: ["Push-ups 3×12–20","Decline Push-ups 3×8–15","Pike Push-ups 3×8–12","Lateral Raises 3×12–15","Chair Dips 3×10–15","Overhead Press (backpack) 3×10–12","Leg Raises 3×12–15","Bicycle Crunches 3×20","Plank 3×60s"] },
  Tuesday:   { tag: "Pull + Back Width", focus: "V-Taper",         exercises: ["Pull-ups 3×8–12","Chin-ups 3×6–10","Backpack Rows 3×12–15","Face Pulls / Rear Delt Rows 3×12–15","Backpack Curls 3×12–15","Hanging Knee Raises 3×10–15","Side Plank 3×30s each"] },
  Wednesday: { tag: "Legs + Core",       focus: "",                exercises: ["Squats 3×20","Bulgarian Split Squats 3×10 each","Lunges 3×12 each","Glute Bridges 3×15","Calf Raises 3×20","Wall Sit 2×60s","Russian Twists 3×20","Reverse Crunches 3×15","Ab Wheel / Dragon Flag Negatives 3×8–10"] },
  Thursday:  { tag: "Active Rest",       focus: "Mobility",        exercises: ["Walk or light jog 15–20 min","Full body stretching 10 min","Foam roll / massage 5 min"] },
  Friday:    { tag: "Full Body",         focus: "Conditioning",    exercises: ["Push-ups 3×15–20","Pull-ups 3×8–12","Squats 3×20","Pike Push-ups 2×10","Burpees 3×10","Plank to Push-up 2×10","Plank 2×90s"] },
  Saturday:  { tag: "Arms + Aesthetics", focus: "Pump",            exercises: ["Backpack Curls 3×12–15","Hammer Curls 3×12","Chair Dips 3×12–15","Diamond Push-ups 3×10–12","Lateral Raises 3×15","Wrist Curls / Forearm Work 3×15"] },
};

// ── Daily stretching (same every day) ───────────────────────────
const STRETCHES = [
  "Neck rolls — 30s each side",
  "Chest opener / doorway stretch — 30s",
  "Shoulder cross-body stretch — 30s each",
  "Tricep overhead stretch — 20s each",
  "Cat-Cow spinal stretch — 10 reps",
  "Child's Pose — 45s",
  "Hip flexor lunge stretch — 30s each",
  "Seated hamstring stretch — 30s each",
  "Pigeon pose / figure-4 — 30s each",
  "Standing quad stretch — 20s each",
  "Calf wall stretch — 20s each",
  "Full body overhead reach — 10 reps",
];

const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

// ── Helpers ──────────────────────────────────────────────────────
function dateKey(d = new Date()) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dayName(ds) { return DAY_NAMES[new Date(ds + "T00:00:00").getDay()]; }
function last14() {
  const out = [];
  for (let i = 13; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate()-i); out.push(dateKey(d)); }
  return out;
}
function pctForDate(ds, checks) {
  const exs = PLAN[dayName(ds)].exercises;
  const dc = checks[ds] || {};
  return exs.length ? Math.round((exs.filter((_,i) => dc['ex_'+i]).length / exs.length) * 100) : 0;
}
function computeStreak(checks) {
  let s = 0;
  for (let i = 0; i < 90; i++) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const p = pctForDate(dateKey(d), checks);
    if (i === 0 && p < 100) continue;
    if (p === 100) s++; else break;
  }
  return s;
}

// ── State ────────────────────────────────────────────────────────
let checks = {};
let selectedDate = dateKey();
let stretchOpen = false;
let saveTimer = null;

// ── localStorage cache ───────────────────────────────────────────
const LS_KEY = "aarav-checks-v1";
function saveToLocal() { try { localStorage.setItem(LS_KEY, JSON.stringify(checks)); } catch(e) {} }
function loadFromLocal() { try { const v = localStorage.getItem(LS_KEY); if (v) checks = JSON.parse(v); } catch(e) {} }

async function scheduleSave() {

saveToLocal();

if(window.auth && auth.currentUser){

await setDoc(
doc(db,"workouts",auth.currentUser.uid),
{
checks: checks
}
);

}

setStatus("Saved ✓");
}
function setStatus(msg) { document.getElementById("save-status").textContent = msg; }
 async function loadUserData() {

if(!auth.currentUser) return;

const snap = await getDoc(
doc(db,"workouts",auth.currentUser.uid)
);

if(snap.exists()){

checks = snap.data().checks || {};

renderAll();

}

}

// ── Toggle stretch ───────────────────────────────────────────────
function toggleStretch() {
  stretchOpen = !stretchOpen;
  document.getElementById("stretch-list").classList.toggle("hidden", !stretchOpen);
  document.getElementById("stretch-chevron").classList.toggle("open", stretchOpen);
}
document.getElementById("stretch-toggle").addEventListener("click", toggleStretch);

// ── Render day row ───────────────────────────────────────────────
function renderDayRow() {
  const row = document.getElementById("day-row");
  row.innerHTML = "";
  last14().slice(-7).forEach(ds => {
    const btn = document.createElement("button");
    btn.className = "day-chip" + (ds === selectedDate ? " active" : "");
    const full = pctForDate(ds, checks) === 100;
    const num = new Date(ds + "T00:00:00").getDate();
    btn.innerHTML = `<span class="day-chip-day">${dayName(ds).slice(0,3)}</span><span class="day-chip-num">${num}</span><span class="day-chip-dot ${full?'filled':''}"></span>`;
    btn.addEventListener("click", () => { selectedDate = ds; renderAll(); });
    row.appendChild(btn);
  });
}


                             // ── Render day card ──────────────────────────────────────────────
function renderDayCard() {
  const dn = dayName(selectedDate);
  const plan = PLAN[dn];
  const dc = checks[selectedDate] || {};
  const isToday = selectedDate === dateKey();

  // exercises
  const done = plan.exercises.filter((_,i) => dc['ex_'+i]).length;
  const total = plan.exercises.length;
  const pct = total ? Math.round((done/total)*100) : 0;

  document.getElementById("day-title").textContent = dn + (isToday ? " · Today" : "");
  document.getElementById("day-subtitle").textContent = plan.tag + (plan.focus ? ` — ${plan.focus}` : "");
  document.getElementById("day-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";

  const exEl = document.getElementById("exercises");
  exEl.innerHTML = "";
  plan.exercises.forEach((ex, idx) => {
    const isDone = !!dc['ex_'+idx];
    const btn = document.createElement("button");
    btn.className = "ex-row" + (isDone ? " done" : "");
    btn.innerHTML = `<span class="ex-checkbox"><span class="checkmark">✓</span></span><span class="ex-label">${ex}</span>`;
    btn.addEventListener("click", () => {
      const d = checks[selectedDate] = checks[selectedDate] || {};
      d['ex_'+idx] = !d['ex_'+idx];
      renderAll(); scheduleSave();
    });
    exEl.appendChild(btn);
  });

  // stretches
  const stretchDone = STRETCHES.filter((_,i) => dc['st_'+i]).length;
  document.getElementById("stretch-count").textContent = `${stretchDone}/${STRETCHES.length}`;

  const stEl = document.getElementById("stretch-list");
  stEl.innerHTML = "";
  STRETCHES.forEach((st, idx) => {
    const isDone = !!dc['st_'+idx];
    const btn = document.createElement("button");
    btn.className = "stretch-row" + (isDone ? " done" : "");
    btn.innerHTML = `<span class="stretch-checkbox"><span class="stretch-check">✓</span></span><span class="stretch-label">${st}</span>`;
    btn.addEventListener("click", () => {
      const d = checks[selectedDate] = checks[selectedDate] || {};
      d['st_'+idx] = !d['st_'+idx];
      renderAll(); scheduleSave();
    });
    stEl.appendChild(btn);
  });
}

// ── Render stats ─────────────────────────────────────────────────
function renderStats() {
  const today = dateKey();
  const dn = dayName(today);
  const plan = PLAN[dn];
  const dc = checks[today] || {};
  const done = plan.exercises.filter((_,i) => dc['ex_'+i]).length;
  const total = plan.exercises.length;
  const pct = total ? Math.round((done/total)*100) : 0;

  document.getElementById("stat-streak").textContent = computeStreak(checks);
  document.getElementById("stat-pct").textContent = pct + "%";
  document.getElementById("stat-done").textContent = `${done}/${total}`;
}

// ── Line chart ───────────────────────────────────────────────────
function renderLineChart() {
  const canvas = document.getElementById("chart");
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 220;
  const H = 130;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.height = H + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  const PAD = { top: 10, right: 8, bottom: 26, left: 28 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;
  const dates = last14();
  const data = dates.map(ds => pctForDate(ds, checks));
  const n = dates.length;

  ctx.clearRect(0, 0, W, H);

  // grid
  [0, 25, 50, 75, 100].forEach(v => {
    const cy = PAD.top + cH - (v/100)*cH;
    ctx.beginPath(); ctx.strokeStyle="#262626"; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.moveTo(PAD.left, cy); ctx.lineTo(PAD.left+cW, cy); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle="#525252"; ctx.font="9px system-ui,sans-serif"; ctx.textAlign="right";
    ctx.fillText(v, PAD.left-4, cy+3);
  });

  // x labels
  dates.forEach((ds, i) => {
    if (i % 2 !== 0) return;
    const d = new Date(ds+"T00:00:00");
    const x = PAD.left + (i/(n-1))*cW;
    ctx.fillStyle="#525252"; ctx.font="9px system-ui,sans-serif"; ctx.textAlign="center";
    ctx.fillText(`${d.getDate()}/${d.getMonth()+1}`, x, H-5);
  });

  // fill area
  ctx.beginPath();
  data.forEach((p,i) => {
    const x = PAD.left+(i/(n-1))*cW, y = PAD.top+cH-(p/100)*cH;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(PAD.left+cW, PAD.top+cH); ctx.lineTo(PAD.left, PAD.top+cH); ctx.closePath();
  const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top+cH);
  grad.addColorStop(0, "rgba(249,115,22,0.18)"); grad.addColorStop(1, "rgba(249,115,22,0)");
  ctx.fillStyle = grad; ctx.fill();

  // line
  ctx.beginPath(); ctx.strokeStyle="#f97316"; ctx.lineWidth=2.5; ctx.lineJoin="round"; ctx.lineCap="round";
  data.forEach((p,i) => {
    const x = PAD.left+(i/(n-1))*cW, y = PAD.top+cH-(p/100)*cH;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }); ctx.stroke();

  // dots
  data.forEach((p,i) => {
    const x = PAD.left+(i/(n-1))*cW, y = PAD.top+cH-(p/100)*cH;
    ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fillStyle="#f97316"; ctx.fill();
    if (p > 0) { ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fillStyle="#0a0a0a"; ctx.fill(); }
  });
}

// ── Pie chart ────────────────────────────────────────────────────
function renderPieChart() {
  const canvas = document.getElementById("pie");
  const dpr = window.devicePixelRatio || 1;
  const SIZE = 110;
  canvas.width = SIZE * dpr; canvas.height = SIZE * dpr;
  canvas.style.width = SIZE + "px"; canvas.style.height = SIZE + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  const today = dateKey();
  const dn = dayName(today);
  const plan = PLAN[dn];
  const dc = checks[today] || {};

  const exDone = plan.exercises.filter((_,i) => dc['ex_'+i]).length;
  const exTotal = plan.exercises.length;
  const stDone = STRETCHES.filter((_,i) => dc['st_'+i]).length;
  const stTotal = STRETCHES.length;
  const exLeft = exTotal - exDone;
  const stLeft = stTotal - stDone;
  const total = exTotal + stTotal;

  const segments = [
    { value: exDone,  color: "#f97316", label: "Ex done" },
    { value: exLeft,  color: "#2a1600", label: "Ex left" },
    { value: stDone,  color: "#38bdf8", label: "St done" },
    { value: stLeft,  color: "#0c2230", label: "St left" },
  ].filter(s => s.value > 0);

  const cx = SIZE/2, cy = SIZE/2, r = SIZE/2 - 8, innerR = r * 0.55;
  let angle = -Math.PI/2;

  ctx.clearRect(0, 0, SIZE, SIZE);

  segments.forEach(seg => {
    const slice = (seg.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    angle += slice;
  });

  // donut hole
  ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, Math.PI*2);
  ctx.fillStyle = "#171717"; ctx.fill();

  // center text
  const totalDone = exDone + stDone;
  const pct = Math.round((totalDone / total) * 100);
  ctx.fillStyle = "#f5f5f5"; ctx.font = `800 ${SIZE*0.16}px system-ui,sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(pct + "%", cx, cy - 5);
  ctx.fillStyle = "#525252"; ctx.font = `500 ${SIZE*0.09}px system-ui,sans-serif`;
  ctx.fillText("overall", cx, cy + SIZE*0.12);

  // legend
  const legend = document.getElementById("pie-legend");
  legend.innerHTML = `
    <div class="pie-legend-item"><span class="pie-dot" style="background:#f97316"></span>${exDone}/${exTotal} Ex</div>
    <div class="pie-legend-item"><span class="pie-dot" style="background:#38bdf8"></span>${stDone}/${stTotal} Stretch</div>
  `;
}

// ── Render all ───────────────────────────────────────────────────
function renderAll() {
  renderStats();
  renderDayRow();
  renderDayCard();
  renderLineChart();
  renderPieChart();
}

setStatus("");


window.addEventListener("resize", () => { renderLineChart(); renderPieChart(); });
</script>
